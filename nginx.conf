server {
    listen 80;
    server_name otwartyparlament.pl api.otwartyparlament.pl n8n.otwartyparlament.pl;
    return 301 https://$host$request_uri;
}

# Main Website
server {
    listen 443 ssl;
    server_name otwartyparlament.pl www.otwartyparlament.pl;

    ssl_certificate /etc/letsencrypt/live/otwartyparlament.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otwartyparlament.pl/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # SSL Challenge
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
}

# API Subdomain
server {
    listen 443 ssl;
    server_name api.otwartyparlament.pl;

    ssl_certificate /etc/letsencrypt/live/otwartyparlament.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otwartyparlament.pl/privkey.pem;

    # No manual CORS headers here - FastAPI backend handles them via CORSMiddleware
    # This prevents the "multiple values '*, *'" error

    location / {
        # Forward requests without prefix to backend's /api/
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        # Forward requests with /api/ prefix
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

