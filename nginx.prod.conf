events {}

http {
    upstream backend {
        server backend:8000;
    }

    upstream n8n {
        server n8n:5678;
    }

    # Przekierowanie HTTP -> HTTPS
    server {
        listen 80;
        server_name api.otwartyparlament.pl n8n.otwartyparlament.pl;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # API (HTTPS)
    server {
        listen 443 ssl;
        server_name api.otwartyparlament.pl;

        ssl_certificate /etc/letsencrypt/live/api.otwartyparlament.pl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.otwartyparlament.pl/privkey.pem;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # n8n (HTTPS)
    server {
        listen 443 ssl;
        server_name n8n.otwartyparlament.pl;

        ssl_certificate /etc/letsencrypt/live/api.otwartyparlament.pl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.otwartyparlament.pl/privkey.pem;

        location / {
            proxy_pass http://n8n;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # Websocket support for n8n
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
