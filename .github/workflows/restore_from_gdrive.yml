name: Restore DB from Google Drive

on:
  workflow_dispatch:

jobs:
  restore_gdrive:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Download & Restore
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 120m
          script: |
            echo "🚀 STARTING GOOGLE DRIVE RESTORE..."
            
            # 1. Install gdown (best tool for Drive files)
            echo "🛠️ Installing gdown..."
            apt-get update && apt-get install -y python3-pip
            pip3 install gdown --break-system-packages || pip3 install gdown
            
            # 2. Download File
            FILE_ID="1NQ8tMBhMfs_h4WI95s5UoGvZb0dom0c1"
            OUTPUT="/root/dump_gdrive.sql.gz"
            
            echo "⬇️ Downloading file (ID: $FILE_ID)..."
            rm -f $OUTPUT # Clear previous attempts
            gdown --id $FILE_ID -O $OUTPUT
            
            if [ ! -f "$OUTPUT" ]; then
                echo "❌ Error: Download failed!"
                exit 1
            fi
            
            SIZE=$(du -h $OUTPUT | cut -f1)
            echo "✅ Downloaded: $SIZE"
            
            # 3. Find Container
            echo "💽 Checking Disk Space:"
            df -h
            
            echo "🔍 Finding Database Container..."
            CONTAINER_ID=$(docker ps -qf name=app-db-1)
            
            # Auto-start if missing
            if [ -z "$CONTAINER_ID" ]; then
                echo "⚠️  DB not running. Finding project dir..."
                
                # Robust find logic matching deploy.yml
                PROJECT_DIR=$(dirname $(find /root -maxdepth 4 -name docker-compose.yml | grep -v "node_modules" | head -n 1))
                
                if [ -n "$PROJECT_DIR" ]; then
                    echo "📂 Found project in: $PROJECT_DIR"
                    cd $PROJECT_DIR
                    
                    echo "⚙️ Validating Config..."
                    docker compose config > /dev/null
                    if [ $? -eq 0 ]; then
                        echo "🚀 Starting DB..."
                        docker compose up -d db
                        docker compose logs db | tail -n 20
                        sleep 20
                    else
                        echo "❌ Invalid docker-compose configuration!"
                    fi
                else
                    echo "❌ Could not find docker-compose.yml in /root"
                    ls -R /root | head -n 20
                fi
                
                CONTAINER_ID=$(docker ps -qf name=app-db-1)
                # Fallback check
                if [ -z "$CONTAINER_ID" ]; then
                     CONTAINER_ID=$(docker ps -qf name=db | head -n 1)
                fi
            fi
            
            if [ -z "$CONTAINER_ID" ]; then
                echo "❌ Error: Could not start DB container."
                docker ps -a
                exit 1
            fi
            
            # 4. Restore
            echo "🕵️ Checking Database Connection (User: kajtek)..."
            docker exec -i $CONTAINER_ID psql -U kajtek -d otwarty_parlament -c "\q" 2>/dev/null
            
            if [ $? -ne 0 ]; then
                echo "⚠️ Connection Failed! Role 'kajtek' missing or DB mismatch."
                echo "💥 PERFORMING FACTORY RESET of Database Volume..."
                
                cd $PROJECT_DIR
                docker compose down -v
                
                echo "🚀 Starting Fresh Database (Initializing 'kajtek' user)..."
                docker compose up -d db
                
                echo "⏳ Waiting 20s for initialization..."
                sleep 20
                
                CONTAINER_ID=$(docker ps -qf name=app-db-1)
                echo "✅ New Container: $CONTAINER_ID"
            else
                 echo "✅ Connection OK."
            fi
            
            echo "⏳ Restoring Database (This may take 15-30 minutes)..."
            
            # CLEAR DB FIRST (Safety for re-runs)
            echo "🧹 Clearing existing schema to avoid conflicts..."
            docker exec -i $CONTAINER_ID psql -U kajtek -d otwarty_parlament -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
            
            # Stream with Log Capture
            gunzip -c $OUTPUT | docker exec -i $CONTAINER_ID psql -U kajtek -d otwarty_parlament > restore.log 2>&1
            
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 0 ]; then
                echo "✅ RESTORE SUCCESSFUL!"
                echo "🧹 Cleaning up dump file..."
                rm $OUTPUT
                rm restore.log
                
                echo "🔄 Restarting Backend to refresh connections..."
                cd app && docker-compose restart backend
            else
                echo "❌ Restore Failed during PSQL import."
                echo "📜 ERROR LOG (Last 50 lines):"
                tail -n 50 restore.log
                exit 1
            fi
            
            echo "🏁 --- DONE ---"
