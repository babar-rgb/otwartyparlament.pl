name: Diagnose VPS Data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/diagnose.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Diagnostics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "🔍 --- FINAL DATA CHECK ---"
            
            echo "📦 Checking .git size (Is this the 4.3GB?):"
            du -sh ./app/.git || echo "No .git folder"
            
            echo "🗄️ Checking for SQL dumps in project:"
            find . -name "*.sql" -o -name "*.dump" -o -name "*.tar"
            
            echo "🏠 Checking for common data locations:"
            ls -la /var/lib/postgresql/data || echo "No host /var/lib/postgresql/data"
            
            echo "🏁 --- END ---"
