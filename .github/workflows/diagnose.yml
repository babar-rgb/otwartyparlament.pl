name: Diagnose VPS Data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/diagnose.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Diagnostics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "🔍 --- DEEP INSPECT ---"
            
            echo "📂 Checking what is inside 4.3GB ./app folder:"
            # List 2 levels deep, excluding huge dirs
            find ./app -maxdepth 2 -not -path '*/.*' -not -path '*/node_modules' -not -path '*/.git' | sort
            
            echo "🔥 Checking Backend Logs (Why is it restarting?):"
            docker logs --tail 50 $(docker ps -a -qf name=app-backend)
            
            echo "🏁 --- END ---"
