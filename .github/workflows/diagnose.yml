name: Diagnose VPS Data

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/diagnose.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Diagnostics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "🔍 --- FILE SYSTEM SEARCH ---"
            
            echo "🕵️‍♂️ Searching for Postgres Data (PG_VERSION files) in /root directory..."
            find /root -name "PG_VERSION" 2>/dev/null || echo "No PG_VERSION found in /root"
            
            echo "🐳 Docker volumes detailed list:"
            docker volume ls
            
            echo "🏁 --- END ---"
