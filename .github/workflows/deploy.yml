name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            # Find the project directory by looking for docker-compose.yml
            # We look in /root (since user is root) or standard paths
            PROJECT_DIR=$(dirname $(find ~/ -maxdepth 3 -name docker-compose.yml | grep -v "node_modules" | head -n 1))
            
            if [ -z "$PROJECT_DIR" ]; then
              echo "❌ Could not find docker-compose.yml in ~/"
              echo "Listing directories in ~:"
              ls -F ~/
              exit 1
            fi
            
            echo "📂 Found project at: $PROJECT_DIR"
            cd "$PROJECT_DIR"
            
            echo "🚀 Starting Deployment..."
            
            # Pull latest changes
            git fetch --all
            git reset --hard origin/main
            
            # Restart Services
            echo "🔄 Rebuilding Docker Containers..."
            docker compose down
            docker compose up -d --build --remove-orphans
            
            # Cleanup unused images
            docker system prune -f
            
            echo "✅ Deployment Complete!"
