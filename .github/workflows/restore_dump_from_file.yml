name: Restore DB from Uploaded File

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: SSH & Restore DB
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 60m
          script: |
            echo "🚀 STARTING DATABASE RESTORE from /root/dump.sql.gz"
            
            FILE="/root/dump.sql.gz"
            if [ ! -f "$FILE" ]; then
                echo "❌ Error: Dump file $FILE not found on server!"
                exit 1
            fi
            
            echo "🔍 Finding Database Container..."
            CONTAINER_ID=$(docker ps -qf name=db | head -n 1)
            
            if [ -z "$CONTAINER_ID" ]; then
                echo "❌ Error: Database container not found!"
                exit 1
            fi
            echo "✅ Found Container: $CONTAINER_ID"
            
            echo "⏳ Restoring Database (This may take 10-20 minutes)..."
            # Gunzip and pipe to psql inside docker
            gunzip -c $FILE | docker exec -i $CONTAINER_ID psql -U kajtek -d otwarty_parlament
            
            if [ $? -eq 0 ]; then
                echo "✅ RESTORE COMPLETE! Database is populated."
                # Optional: Remove dump to save space? Let's keep it for now.
                # rm $FILE
            else
                echo "❌ Restore Failed."
                exit 1
            fi
            
            echo "🏁 --- END ---"
