name: Restore DB from Uploaded File

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: SSH & Restore DB
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 60m
          script: |
            echo "🚀 STARTING DATABASE RESTORE from /root/dump.sql.gz"
            
            FILE="/root/app/dump_parlament.backup"
            if [ ! -f "$FILE" ]; then
                echo "❌ Error: Dump file $FILE not found on server!"
                ls -lh /root/app/
                exit 1
            fi
            
            echo "💽 Checking Disk Space:"
            df -h
            
            echo "🔍 Finding Database Container..."
            docker ps --format "table {{.ID}}\t{{.Names}}\t{{.Status}}"
            
            # Find ID
            CONTAINER_ID=$(docker ps -qf name=app-db-1)
            if [ -z "$CONTAINER_ID" ]; then
                 echo "⚠️ Exact match 'app-db-1' not found, searching..."
                 CONTAINER_ID=$(docker ps -qf name=db | head -n 1)
            fi

            if [ -z "$CONTAINER_ID" ]; then
                echo "❌ Error: Database container not found!"
                exit 1
            fi
            echo "✅ Found Container: $CONTAINER_ID"
            
            echo "⏳ Restoring Database from $FILE ..."
            
            # Use cat | docker exec -i with pg_restore
            # This handles the case where the file is on the host but not mounted in the container
            cat "$FILE" | docker exec -i $CONTAINER_ID pg_restore -U kajtek -d otwarty_parlament -v --clean --if-exists --no-owner --role=kajtek
            
            if [ $? -eq 0 ]; then
                echo "✅ RESTORE COMPLETE! Database is populated."
            else
                echo "❌ Restore Failed. Checking if it's a text dump..."
                # Fallback check - if it's just raw SQL
                # cat "$FILE" | docker exec -i $CONTAINER_ID psql -U kajtek -d otwarty_parlament
                exit 1
            fi
            
            echo "🏁 --- END ---"
