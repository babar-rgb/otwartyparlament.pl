version: '3.8'

services:
  # 1. Baza Danych (Postgres + pgvector)
  db:
    image: ankane/pgvector:latest
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - parlament_net
    # Port 5432 nie jest wystawiony na świat (zalecone w raporcie)
    # Dostęp przez sieć wewnętrzną Dockera lub tunel SSH

    # 2. Twój Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    networks:
      - parlament_net

  # 3. Automatyzacja (n8n)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    privileged: true
    ports:
      - "127.0.0.1:5678:5678" # Tylko localhost, Nginx zrobi proxy
    environment:
      - N8N_HOST=n8n.otwartyparlament.pl
      - WEBHOOK_URL=https://n8n.otwartyparlament.pl/
      - GENERIC_TIMEZONE=Europe/Warsaw
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - parlament_net

  # 4. Bramkarz (Nginx Reverse Proxy)
  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - n8n
      - frontend
    networks:
      - parlament_net

  # 3. Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.otwartyparlament.pl
    restart: always
    networks:
      - parlament_net

networks:
  parlament_net:


volumes:
  postgres_data:
  n8n_data:
