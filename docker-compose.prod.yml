version: '3.8'

services:
  # Caddy handles SSL certificates automatically and acts as a reverse proxy
  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  # Backend API (FastAPI)
  backend:
    build: ./backend
    restart: always
    env_file: .env.prod
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

  # Frontend (Vite/Nginx)
  # In a strict production setup, you would verify this builds to static files
  # hosted by Nginx or Caddy directly. For simplicity, we use the container.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      # Ensure this matches your domain
      - VITE_API_BASE_URL=https://api.twojadomena.pl 

  # Database
  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env.prod

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
