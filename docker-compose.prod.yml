version: '3.8'

services:
  # 1. DATABASE
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?error}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:?error}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  # 2.5 BACKEND API (Python FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_USER: ${POSTGRES_USER:?error}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:?error}
    # No ports mapping to host to avoid 8000 conflict. 
    # Frontend/Nginx should proxy to http://backend:8000 if needed.
    networks:
      - app-network
    depends_on:
      - db

  # 3. WORKER (ETL & Scheduler)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_USER: ${POSTGRES_USER:?error}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:?error}
      # API URL for internal calls if needed

    command: [ "python3", "-m", "backend.scheduler" ]
    networks:
      - app-network
    depends_on:
      - db

  # 4. FRONTEND (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public URL where the API will be accessible from the browser

    restart: always
    ports:
      - "${APP_PORT:-8080}:80"
    networks:
      - app-network

volumes:
  pgdata:


networks:
  app-network:
    driver: bridge
